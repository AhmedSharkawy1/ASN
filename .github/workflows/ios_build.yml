name: iOS Build (Unsigned IPA)

on:
  workflow_dispatch: # Allows you to manually trigger the build from GitHub

jobs:
  build_ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: ./asn_app
        run: flutter pub get

      - name: Build iOS (No Codesign)
        working-directory: ./asn_app
        run: flutter build ios --release --no-codesign

      - name: Create IPA payload
        working-directory: ./asn_app
        run: |
          mkdir -p build/ios/iphoneos/Payload
          mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -qq -r -9 asn_menu.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: asn_menu_ios
          path: asn_app/build/ios/iphoneos/asn_menu.ipa
