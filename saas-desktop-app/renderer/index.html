<!DOCTYPE html>
<html>
<head>
  <title>SaaS Desktop - Sync Status</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; padding: 20px; }
    .status-card { background: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333; }
    .status-indicator { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 10px; }
    .online { background: #4caf50; }
    .offline { background: #f44336; }
    button { background: #2196f3; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
    button:disabled { background: #555; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="status-card">
    <h2>Sync Monitor</h2>
    <p>Network Status: <span id="network-dot" class="status-indicator offline"></span><span id="network-text">Checking...</span></p>
    <p>Last Sync: <span id="last-sync">Never</span></p>
    <button id="sync-now">Sync Now</button>
  </div>

  <script>
    const networkDot = document.getElementById('network-dot');
    const networkText = document.getElementById('network-text');
    const syncBtn = document.getElementById('sync-now');

    async function updateStatus() {
      const isOnline = await window.electronAPI.checkNetwork();
      networkDot.className = `status-indicator ${isOnline ? 'online' : 'offline'}`;
      networkText.innerText = isOnline ? 'Online' : 'Offline';
    }

    syncBtn.addEventListener('click', () => {
      window.electronAPI.manualSync();
      syncBtn.disabled = true;
      setTimeout(() => syncBtn.disabled = false, 5000);
    });

    setInterval(updateStatus, 5000);
    updateStatus();
  </script>
</body>
</html>
