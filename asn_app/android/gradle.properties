# Sized for a 16GB machine with ~5GB free: an oversized heap (was 8G+4G
# metaspace) gets the daemon OOM-killed mid-build.
org.gradle.jvmargs=-Xmx3G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m
org.gradle.workers.max=2
android.useAndroidX=true
# Compile Kotlin inside the Gradle daemon; the external Kotlin daemon is
# unreliable on this machine (RMI "Daemon compilation failed: null").
kotlin.compiler.execution.strategy=in-process
